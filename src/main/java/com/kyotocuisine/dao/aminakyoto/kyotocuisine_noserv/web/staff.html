<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyoto Cuisine - Staff</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="topbar">
        <div class="brand">KYOTO CUISINE</div>
        <nav>
            <a href="staff.html">Staff Dashboard</a>
            <a href="/logout">Logout</a>
        </nav>
    </header>

    <main class="page narrow">
        <section class="hero small">
            <h1>Staff Dashboard</h1>
            <p>Advance order status in a simple form-based flow.</p>
        </section>

        <section class="form-card">
            <form action="/orders/staff-update" method="post">
                <label>Order ID</label>
                <input type="number" name="orderId" value="1" min="1" required>
                <button type="submit">Advance Status</button>
            </form>
        </section>
    </main>
</body>

</html>
