<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Staff — Kyoto Cuisine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&family=Zen+Old+Mincho:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/design.css">
<style>
.page { padding: 140px 48px 100px; max-width: 1600px; margin: 0 auto; }
.page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 32px; flex-wrap: wrap; margin-bottom: 56px; padding-bottom: 32px; border-bottom: 1px solid var(--ink); }
.page-head h1 { font-family: var(--serif); font-size: clamp(44px, 5vw, 76px); font-weight: 300; line-height: 1; margin: 12px 0 0; }
.page-head h1 em { font-style: italic; }
.page-head .sub { font-family: var(--serif); font-style: italic; font-size: 18px; color: var(--ink-mute); margin-top: 8px; }
.page-head .refresh-tag {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;
    border: 1px solid var(--paper-line); padding: 10px 18px; color: var(--ink-mute);
}

.orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 24px; }
.order-card { border: 1px solid var(--paper-line); padding: 24px; background: var(--bg); position: relative; transition: border-color 200ms; }
.order-card:hover { border-color: var(--ink); }
.order-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 16px; }
.order-id { font-family: var(--serif); font-size: 28px; font-weight: 400; }
.order-meta { font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-mute); margin-top: 4px; }
.order-items { list-style: none; padding: 0; margin: 0 0 16px; font-family: var(--serif); font-size: 16px; }
.order-items li { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dotted var(--paper-line); color: var(--ink-soft); }
.order-items li:last-child { border-bottom: none; }
.order-total { display: flex; justify-content: space-between; font-family: var(--serif); font-size: 20px; padding-top: 10px; border-top: 1px solid var(--ink); margin-bottom: 14px; }
.order-total .num { color: var(--accent); }
.order-notes { background: rgba(15, 14, 12, 0.04); border-left: 2px solid var(--paper-line); padding: 10px 14px; font-family: var(--serif); font-style: italic; font-size: 14px; color: var(--ink-mute); margin-bottom: 14px; }
.advance-btn {
    width: 100%; padding: 14px;
    background: var(--ink); color: var(--bg); border: none;
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.25em; text-transform: uppercase;
    cursor: pointer; transition: all 300ms;
}
.advance-btn:hover { background: var(--accent); }
.advance-btn.ready { background: var(--gold); }
.advance-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.empty {
    border: 1px dashed var(--paper-line);
    padding: 60px 20px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 20px;
    text-align: center;
    color: var(--ink-mute);
    grid-column: 1 / -1;
}
@media (max-width: 600px) { .page { padding: 120px 24px 60px; } }
</style>
</head>
<body>
<canvas id="ink-canvas"></canvas>
<div id="root">
    <div id="kc-nav-slot"></div>

    <div class="page">
        <div class="page-head">
            <div>
                <div class="eyebrow"><span class="jp" style="font-family:var(--jp); font-size:28px; letter-spacing:0; text-transform:none;">板場</span><span class="eyebrow-rule"></span><span>Staff · Active orders</span></div>
                <h1>The <em>counter</em>.</h1>
                <div class="sub">Live orders. Advance each through the stages as the dish moves.</div>
            </div>
            <div class="refresh-tag">Auto-refresh · every 20s</div>
        </div>

        <div class="orders-grid" id="ordersGrid"><div class="empty">Loading orders...</div></div>
    </div>
</div>

<script src="/assets/ink.js"></script>
<script>
document.getElementById('kc-nav-slot').innerHTML = window.buildKyotoNav('Staff');

const session = window.kcSession.get();
if (!session || !session.token || (session.role !== 'STAFF' && session.role !== 'ADMIN')) {
    alert('Access denied — staff or admin only.');
    location.href = '/login.html?redirect=/staff.html';
}

function formatPrice(v) { return '€' + Number(v).toFixed(2); }
function fmtTime(iso) { return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }); }

const NEXT_LABEL = { NOT_PREPARING: 'Start preparing', PREPARING: 'Mark ready', READY: 'Complete order' };

async function loadOrders() {
    try {
        const res = await fetch('/api/staff/orders', { headers: { 'Authorization': session.token } });
        if (!res.ok) throw new Error('Access denied');
        const orders = await res.json();
        const grid = document.getElementById('ordersGrid');
        if (!orders.length) { grid.innerHTML = '<div class="empty">No active orders. Quiet counter.</div>'; return; }
        grid.innerHTML = orders.map(o => {
            const items = (o.items || []).map(i => `<li><span>${i.itemName} × ${i.quantity}</span><span>${formatPrice(i.lineTotal)}</span></li>`).join('');
            const next = NEXT_LABEL[o.statusName];
            return `<div class="order-card">
                <div class="order-top">
                    <div>
                        <div class="order-id">#${o.orderId}</div>
                        <div class="order-meta">${o.customerName || 'Guest'} · ${fmtTime(o.placedAt)} · ${o.orderType}</div>
                    </div>
                    <span class="badge ${o.statusName}">${o.statusName.replace('_',' ')}</span>
                </div>
                <ul class="order-items">${items}</ul>
                <div class="order-total"><span>Total</span><span class="num">${formatPrice(o.totalAmount)}</span></div>
                ${o.notes ? `<div class="order-notes">Note: ${o.notes}</div>` : ''}
                ${next ? `<button class="advance-btn ${o.statusName === 'PREPARING' ? 'ready' : ''}" data-advance="${o.orderId}">${next} →</button>` : ''}
            </div>`;
        }).join('');
        grid.querySelectorAll('[data-advance]').forEach(btn => btn.onclick = () => advance(Number(btn.dataset.advance), btn));
    } catch (e) { console.error(e); }
}

async function advance(id, btn) {
    btn.disabled = true; btn.textContent = 'Advancing...';
    try {
        const res = await fetch('/api/staff/orders/' + id + '/advance', { method: 'PUT', headers: { 'Authorization': session.token } });
        if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
        loadOrders();
    } catch (e) { alert(e.message); btn.disabled = false; }
}

loadOrders();
setInterval(loadOrders, 20000);
</script>
</body>
</html>
