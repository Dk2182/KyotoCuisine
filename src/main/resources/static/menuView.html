<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kyoto Cuisine - Menu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, Helvetica, sans-serif; background: #f4f1ee; color: #2f2a28; }
        .serif { font-family: Georgia, "Times New Roman", serif; }
        /* NAV */
        .topbar { background: #fbfaf8; border-bottom: 1px solid #e4ddd7; padding: 14px 28px; }
        .topbar-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
        .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
        .brand-icon { width: 38px; height: 38px; border-radius: 50%; background: #cf544c; position: relative; flex-shrink: 0; }
        .brand-icon::after { content: ""; position: absolute; inset: 9px; border: 2px solid #fff; border-radius: 50%; }
        .brand-name { font-size: 20px; font-weight: 700; line-height: 1; }
        .brand-subtitle { margin-top: 4px; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #8f8882; }
        .nav-links { display: flex; align-items: center; gap: 6px; }
        .nav-link { border: 1px solid #e4ddd7; background: #fff; color: #433d39; border-radius: 12px; padding: 10px 16px; font-size: 14px; cursor: pointer; text-decoration: none; transition: 0.2s; white-space: nowrap; }
        .nav-link:hover { background: #f4f1ee; }
        .nav-link.active { background: #cf544c; color: #fff; border-color: #cf544c; }
        .topbar-actions { display: flex; align-items: center; gap: 12px; }
        .cart-btn { border: none; background: transparent; cursor: pointer; position: relative; font-size: 22px; display: flex; align-items: center; justify-content: center; }
        .cart-count { position: absolute; top: -8px; right: -10px; min-width: 20px; height: 20px; border-radius: 999px; background: #cf544c; color: #fff; font-size: 11px; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
        .user-btn { border: 1px solid #d8d0ca; background: #fff; color: #433d39; border-radius: 12px; padding: 10px 16px; font-size: 14px; cursor: pointer; }
        /* HERO */
        .hero { background: #fbfaf8; border-bottom: 1px solid #e7dfd9; text-align: center; padding: 48px 20px 30px; }
        .hero h1 { font-size: 54px; color: #332d2a; margin-bottom: 12px; }
        .hero p { color: #8a847e; font-size: 16px; margin-bottom: 24px; }
        .search-wrap { max-width: 430px; margin: 0 auto; background: #f0ece8; border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
        .search-wrap input { width: 100%; border: none; outline: none; background: transparent; font-size: 14px; color: #4d4743; }
        .search-wrap input::placeholder { color: #9a938d; }
        .filters { margin-top: 16px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .filter-btn { border: none; background: transparent; color: #47413d; padding: 8px 14px; border-radius: 999px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .filter-btn.active { background: #cf544c; color: white; }
        /* GRID */
        .menu-section { max-width: 1280px; margin: 0 auto; padding: 30px 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
        .card { background: #fbfaf8; border: 1px solid #ded5ce; border-radius: 18px; overflow: hidden; }
        .card-image-wrap { position: relative; height: 190px; overflow: hidden; }
        .card-image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .badge { position: absolute; top: 10px; right: 10px; background: #d9b228; color: #473a08; padding: 5px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; }
        .card-body { padding: 14px; }
        .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
        .card-title { font-size: 17px; line-height: 1.2; }
        .price { color: #cf544c; font-weight: 700; font-size: 15px; white-space: nowrap; }
        .description { margin-top: 10px; color: #8c857f; font-size: 14px; line-height: 1.5; min-height: 62px; }
        .add-btn { margin-top: 14px; width: 100%; border: none; border-radius: 12px; background: #cf544c; color: #fff; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s ease; }
        .add-btn:hover { opacity: 0.92; }
        /* CART DRAWER */
        .overlay { position: fixed; inset: 0; background: rgba(37,29,25,0.18); opacity: 0; visibility: hidden; transition: 0.25s ease; z-index: 30; }
        .overlay.show { opacity: 1; visibility: visible; }
        .cart-drawer { position: fixed; top: 0; right: 0; width: 380px; max-width: 100%; height: 100vh; background: #fbfaf8; box-shadow: -10px 0 30px rgba(0,0,0,0.08); transform: translateX(100%); transition: transform 0.28s ease; z-index: 40; display: flex; flex-direction: column; border-left: 1px solid #e4ddd7; }
        .cart-drawer.open { transform: translateX(0); }
        .cart-header { display: flex; align-items: flex-start; justify-content: space-between; padding: 18px; border-bottom: 1px solid #ece2db; }
        .cart-header-left { display: flex; align-items: flex-start; gap: 10px; }
        .cart-header-icon { width: 26px; height: 26px; border-radius: 50%; background: #f8e2df; color: #cf544c; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 2px; }
        .cart-title { font-size: 18px; color: #332d2a; line-height: 1.1; }
        .cart-subtitle { margin-top: 4px; color: #9a938d; font-size: 13px; }
        .close-cart { border: none; background: transparent; font-size: 24px; color: #5f5854; cursor: pointer; line-height: 1; }
        .cart-body { flex: 1; overflow-y: auto; padding: 16px; }
        .cart-empty { color: #8c857f; text-align: center; padding: 40px 12px; font-size: 14px; }
        .cart-item { border: 1px solid #e3d9d2; background: #fffdfb; border-radius: 16px; padding: 12px; display: grid; grid-template-columns: 58px 1fr auto; gap: 12px; align-items: start; margin-bottom: 14px; }
        .cart-item img { width: 58px; height: 58px; object-fit: cover; border-radius: 12px; display: block; }
        .cart-item-name { font-size: 16px; color: #332d2a; margin-bottom: 4px; }
        .cart-item-price { font-size: 14px; color: #cf544c; font-weight: 700; margin-bottom: 10px; }
        .cart-item-controls { display: flex; align-items: center; gap: 10px; }
        .cart-action-btn { width: 28px; height: 28px; border-radius: 10px; border: 1px solid #e3d9d2; background: #faf5f1; color: #4b4541; cursor: pointer; font-size: 18px; line-height: 1; display: flex; align-items: center; justify-content: center; }
        .cart-item-qty { min-width: 18px; text-align: center; font-size: 15px; }
        .cart-item-right { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; gap: 18px; min-height: 58px; }
        .remove-btn { border: none; background: transparent; color: #cf544c; cursor: pointer; font-size: 16px; }
        .cart-item-total { font-size: 16px; font-weight: 700; color: #332d2a; }
        .cart-footer { border-top: 1px solid #e4ddd7; background: #fbfaf8; padding: 18px 16px 14px; }
        .summary-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 15px; color: #4a4440; }
        .summary-row.total { margin-top: 12px; padding-top: 12px; border-top: 1px solid #e7ddd6; font-weight: 700; font-size: 18px; color: #332d2a; }
        .summary-row.total span:last-child { color: #cf544c; }
        .tax-note { font-size: 12px; color: #9a938d; text-align: center; margin-top: 4px; }
        .checkout-btn { width: 100%; border: none; border-radius: 14px; background: #cf544c; color: #fff; padding: 14px 16px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 14px; box-shadow: 0 8px 18px rgba(207,84,76,0.18); }
        .checkout-btn:hover { opacity: 0.92; }
        @media (max-width: 1100px) { .menu-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 820px) { .hero h1 { font-size: 42px; } .menu-grid { grid-template-columns: repeat(2, 1fr); } .nav-links { display: none; } }
        @media (max-width: 560px) { .topbar-inner { flex-wrap: wrap; } .hero h1 { font-size: 32px; } .menu-grid { grid-template-columns: 1fr; } .cart-drawer { width: 100%; } }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a class="brand" href="/menuView.html">
                <div class="brand-icon"></div>
                <div><div class="brand-name">Kyoto Cuisine</div><div class="brand-subtitle">Japanese Restaurant</div></div>
            </a>
            <div class="nav-links" id="navLinks"></div>
            <div class="topbar-actions">
                <button class="cart-btn" id="cartBtn" aria-label="Open cart">&#128722;<span class="cart-count" id="cartCount">0</span></button>
                <button class="user-btn" id="userBtn">Login</button>
            </div>
        </div>
    </header>
    <section class="hero">
        <h1 class="serif">Our Menu</h1>
        <p>Experience the authentic flavors of Japan, crafted with care and tradition</p>
        <div class="search-wrap"><span>&#128269;</span><input id="searchInput" type="text" placeholder="Search menu items..." /></div>
        <div class="filters" id="filters"></div>
    </section>
    <main class="menu-section"><div class="menu-grid" id="menuGrid"></div></main>
    <div class="overlay" id="overlay"></div>
    <aside class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <div class="cart-header-left"><div class="cart-header-icon">&#128092;</div><div><div class="cart-title serif">Your Cart</div><div class="cart-subtitle" id="cartItemCountLabel">0 items</div></div></div>
            <button class="close-cart" id="closeCartBtn" aria-label="Close cart">&times;</button>
        </div>
        <div class="cart-body" id="cartItemsContainer"></div>
        <div class="cart-footer">
            <div class="summary-row total"><span>Total (tax included)</span><span id="totalValue">$0.00</span></div>
            <div class="tax-note">All prices include applicable taxes</div>
            <button class="checkout-btn" id="checkoutBtn">Continue to Checkout</button>
        </div>
    </aside>

    <script>
        const TAX_RATE = 0.10;
        let menuItems = [];
        let activeCategory = "All";
        let searchText = "";

        // Cart from localStorage
        let cart = JSON.parse(localStorage.getItem('kyoto_cart') || '[]');

        function getSession() { return JSON.parse(localStorage.getItem('kyoto_session') || 'null'); }
        function formatPrice(v) { return '$' + v.toFixed(2); }
        function saveCart() { localStorage.setItem('kyoto_cart', JSON.stringify(cart)); }

        // Build nav based on role
        function buildNav() {
            const s = getSession();
            const nav = document.getElementById('navLinks');
            const userBtn = document.getElementById('userBtn');
            let links = '<a class="nav-link active" href="/menuView.html">Menu</a>';
            links += '<a class="nav-link" href="/reservation.html">Reservations</a>';
            if (s && (s.role === 'STAFF' || s.role === 'ADMIN')) {
                links += '<a class="nav-link" href="/staff.html">Staff</a>';
            }
            if (s && s.role === 'ADMIN') {
                links += '<a class="nav-link" href="/admin.html">Admin</a>';
            }
            nav.innerHTML = links;
            if (s && s.token) {
                userBtn.textContent = s.firstName || 'Account';
                userBtn.onclick = () => { if (confirm('Sign out?')) { localStorage.removeItem('kyoto_session'); location.reload(); }};
            } else {
                userBtn.textContent = 'Login';
                userBtn.onclick = () => { window.location.href = '/login.html'; };
            }
        }

        // Fetch menu from API
        async function loadMenu() {
            try {
                const res = await fetch('/api/menu');
                menuItems = await res.json();
            } catch (e) {
                console.error('Failed to load menu', e);
                menuItems = [];
            }
            const cats = ["All", ...new Set(menuItems.map(i => i.categoryName))];
            renderFilters(cats);
            renderMenu();
        }

        function renderFilters(cats) {
            const el = document.getElementById('filters');
            el.innerHTML = '';
            cats.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn' + (c === activeCategory ? ' active' : '');
                btn.textContent = c;
                btn.onclick = () => { activeCategory = c; renderFilters(cats); renderMenu(); };
                el.appendChild(btn);
            });
        }

        function renderMenu() {
            const filtered = menuItems.filter(i => {
                const catOk = activeCategory === 'All' || i.categoryName === activeCategory;
                const searchOk = i.itemName.toLowerCase().includes(searchText.toLowerCase()) || (i.description || '').toLowerCase().includes(searchText.toLowerCase());
                return catOk && searchOk;
            });
            document.getElementById('menuGrid').innerHTML = filtered.map(i => `
                <div class="card">
                    <div class="card-image-wrap">
                        <img src="${i.imageUrl}" alt="${i.itemName}" />
                        ${i.bestseller ? '<span class="badge">Bestseller</span>' : ''}
                    </div>
                    <div class="card-body">
                        <div class="card-top"><div class="card-title serif">${i.itemName}</div><div class="price">${formatPrice(i.price)}</div></div>
                        <div class="description">${i.description || ''}</div>
                        <button class="add-btn" onclick="addToCart(${i.menuItemId})">+ Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const existing = cart.find(c => c.menuItemId === id);
            if (existing) { existing.quantity++; }
            else {
                const item = menuItems.find(i => i.menuItemId === id);
                cart.push({ menuItemId: item.menuItemId, itemName: item.itemName, price: item.price, imageUrl: item.imageUrl, quantity: 1 });
            }
            saveCart(); renderCart(); openCart();
        }

        function changeQuantity(id, delta) {
            cart = cart.map(c => c.menuItemId === id ? { ...c, quantity: c.quantity + delta } : c).filter(c => c.quantity > 0);
            saveCart(); renderCart();
        }

        function removeFromCart(id) {
            cart = cart.filter(c => c.menuItemId !== id);
            saveCart(); renderCart();
        }

        function openCart() { document.getElementById('cartDrawer').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
        function closeCart() { document.getElementById('cartDrawer').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

        function renderCart() {
            const totalItems = cart.reduce((s, c) => s + c.quantity, 0);
            const subtotal = cart.reduce((s, c) => s + c.price * c.quantity, 0);
            const total = subtotal * (1 + TAX_RATE);
            document.getElementById('cartCount').textContent = totalItems;
            document.getElementById('cartItemCountLabel').textContent = totalItems + (totalItems === 1 ? ' item' : ' items');
            document.getElementById('totalValue').textContent = formatPrice(total);
            const container = document.getElementById('cartItemsContainer');
            if (cart.length === 0) { container.innerHTML = '<div class="cart-empty">Your cart is empty.</div>'; return; }
            container.innerHTML = cart.map(c => {
                const lt = c.price * c.quantity;
                return `<div class="cart-item">
                    <img src="${c.imageUrl}" alt="${c.itemName}" />
                    <div>
                        <div class="cart-item-name serif">${c.itemName}</div>
                        <div class="cart-item-price">${formatPrice(c.price)}</div>
                        <div class="cart-item-controls">
                            <button class="cart-action-btn" onclick="changeQuantity(${c.menuItemId}, -1)">&minus;</button>
                            <div class="cart-item-qty">${c.quantity}</div>
                            <button class="cart-action-btn" onclick="changeQuantity(${c.menuItemId}, 1)">+</button>
                        </div>
                    </div>
                    <div class="cart-item-right">
                        <button class="remove-btn" onclick="removeFromCart(${c.menuItemId})">&#128465;</button>
                        <div class="cart-item-total">${formatPrice(lt)}</div>
                    </div>
                </div>`;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', e => { searchText = e.target.value; renderMenu(); });
        document.getElementById('cartBtn').addEventListener('click', openCart);
        document.getElementById('closeCartBtn').addEventListener('click', closeCart);
        document.getElementById('overlay').addEventListener('click', closeCart);
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCart(); });
        document.getElementById('checkoutBtn').addEventListener('click', () => {
            if (cart.length === 0) { alert('Your cart is empty!'); return; }
            const s = getSession();
            if (!s || !s.token) { window.location.href = '/login.html'; return; }
            window.location.href = '/payment.html';
        });

        buildNav();
        loadMenu();
        renderCart();
    </script>
</body>
</html>
