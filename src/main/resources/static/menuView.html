<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Order — Kyoto Cuisine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Space+Mono:wght@400;700&family=Zen+Old+Mincho:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/design.css">
<style>
.page-head {
    padding: 160px 48px 48px;
    max-width: 1600px;
    margin: 0 auto;
    text-align: center;
}
.page-head .eyebrow { justify-content: center; }
.page-head h1 {
    font-family: var(--serif);
    font-size: clamp(52px, 9vw, 140px);
    font-weight: 300;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin: 0 0 24px;
}
.page-head h1 em { font-style: italic; font-weight: 300; }
.page-head p { font-family: var(--serif); font-style: italic; font-size: 20px; color: var(--ink-mute); max-width: 50ch; margin: 0 auto; font-weight: 300; }

.filter-bar {
    max-width: 1600px;
    margin: 48px auto 64px;
    padding: 0 48px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 32px;
    flex-wrap: wrap;
}
.search-box {
    flex: 1;
    max-width: 420px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--ink);
    padding: 12px 0;
}
.search-box input {
    flex: 1;
    border: none;
    background: transparent;
    outline: none;
    font-family: var(--serif);
    font-size: 17px;
    color: var(--ink);
}
.search-box input::placeholder { color: var(--ink-faint); font-style: italic; }
.search-box::before {
    content: "🔍";
    font-size: 14px;
    opacity: 0.6;
}

.filters {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    border: 1px solid var(--ink);
}
.filter-btn {
    padding: 12px 22px;
    border: none;
    background: transparent;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 300ms;
    border-right: 1px solid var(--ink);
}
.filter-btn:last-child { border-right: none; }
.filter-btn.active { background: var(--ink); color: var(--bg); }
.filter-btn:not(.active):hover { background: rgba(15,14,12,0.05); }

.menu-grid {
    max-width: 1600px;
    margin: 0 auto 120px;
    padding: 0 48px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border-top: 1px solid var(--paper-line);
    border-left: 1px solid var(--paper-line);
}
.dish-card {
    background: var(--bg);
    border-right: 1px solid var(--paper-line);
    border-bottom: 1px solid var(--paper-line);
    padding: 0;
    display: flex;
    flex-direction: column;
    transition: background 300ms;
    position: relative;
    overflow: hidden;
}
.dish-card:hover { background: var(--bg-deep); }
.dish-image {
    position: relative;
    aspect-ratio: 4/3;
    overflow: hidden;
    background: var(--ink);
}
.dish-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: grayscale(0.15) brightness(0.98);
    transition: transform 600ms cubic-bezier(.2,.7,.2,1), filter 400ms;
}
.dish-card:hover .dish-image img { transform: scale(1.04); filter: none; }
.dish-badge {
    position: absolute;
    top: 14px; left: 14px;
    background: var(--accent);
    color: var(--bg);
    padding: 4px 10px;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
}
.dish-body {
    padding: 24px 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
}
.dish-name { font-family: var(--serif); font-size: 24px; font-weight: 400; color: var(--ink); line-height: 1.2; }
.dish-desc { font-family: var(--serif); font-style: italic; font-size: 15px; line-height: 1.5; color: var(--ink-mute); margin-top: 4px; flex: 1; }
.dish-footer {
    margin-top: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
}
.dish-price { font-family: var(--serif); font-size: 22px; font-weight: 400; color: var(--ink); font-variant-numeric: tabular-nums; }
.add-btn {
    padding: 10px 16px;
    background: var(--ink);
    color: var(--bg);
    border: none;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 200ms;
}
.add-btn:hover { opacity: 0.86; }
.add-btn.added { background: var(--accent); }

/* Cart drawer */
.overlay { position: fixed; inset: 0; background: rgba(15,14,12,0.3); opacity: 0; visibility: hidden; transition: 0.25s ease; z-index: 50; }
.overlay.show { opacity: 1; visibility: visible; }
.cart-drawer {
    position: fixed; top: 0; right: 0;
    width: 420px; max-width: 100%;
    height: 100vh;
    background: var(--bg);
    border-left: 1px solid var(--ink);
    transform: translateX(100%);
    transition: transform 0.4s cubic-bezier(.2,.7,.2,1);
    z-index: 60;
    display: flex; flex-direction: column;
}
.cart-drawer.open { transform: translateX(0); }
.cart-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 28px;
    border-bottom: 1px solid var(--paper-line);
}
.cart-head-title { font-family: var(--serif); font-size: 24px; font-weight: 300; color: var(--ink); }
.cart-head-title em { font-style: italic; }
.cart-head-sub { font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-mute); margin-top: 4px; }
.cart-close { background: none; border: none; font-size: 26px; color: var(--ink-mute); cursor: pointer; line-height: 1; }
.cart-body { flex: 1; overflow-y: auto; padding: 20px 28px; }
.cart-empty { font-family: var(--serif); font-style: italic; font-size: 17px; color: var(--ink-mute); text-align: center; padding: 40px 20px; }
.cart-item {
    padding: 20px 0;
    border-bottom: 1px solid var(--paper-line);
    display: grid;
    grid-template-columns: 60px 1fr auto;
    gap: 14px;
    align-items: start;
}
.cart-item img { width: 60px; height: 60px; object-fit: cover; }
.cart-item-info .name { font-family: var(--serif); font-size: 18px; color: var(--ink); margin-bottom: 4px; }
.cart-item-info .price { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: var(--ink-mute); margin-bottom: 10px; }
.qty-row { display: flex; align-items: center; gap: 10px; }
.qty-btn {
    width: 26px; height: 26px;
    border: 1px solid var(--paper-line);
    background: var(--bg);
    color: var(--ink);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 200ms;
}
.qty-btn:hover { border-color: var(--ink); }
.qty-val { font-family: var(--serif); font-size: 17px; min-width: 18px; text-align: center; }
.cart-item-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    height: 100%;
}
.cart-remove { background: none; border: none; cursor: pointer; color: var(--accent); font-size: 13px; font-family: var(--mono); letter-spacing: 0.15em; text-transform: uppercase; }
.cart-item-total { font-family: var(--serif); font-size: 17px; font-weight: 400; color: var(--ink); }
.cart-foot {
    padding: 24px 28px;
    border-top: 1px solid var(--ink);
    background: var(--bg);
}
.cart-total-row {
    display: flex; justify-content: space-between;
    font-family: var(--serif);
    font-size: 20px;
    margin-bottom: 6px;
}
.cart-total-row .num { color: var(--accent); font-weight: 400; }
.cart-tax-note { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: var(--ink-faint); text-align: right; text-transform: uppercase; margin-bottom: 18px; }

@media (max-width: 1100px) { .menu-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 800px)  { .menu-grid { grid-template-columns: repeat(2, 1fr); } .page-head { padding: 120px 24px 32px; } .filter-bar { padding: 0 24px; flex-direction: column; align-items: stretch; } .search-box { max-width: none; } .menu-grid { padding: 0 24px; } }
@media (max-width: 500px)  { .menu-grid { grid-template-columns: 1fr; } .cart-drawer { width: 100%; } }
</style>
</head>
<body>
<canvas id="ink-canvas"></canvas>
<div id="root">
    <div id="kc-nav-slot"></div>

    <div class="page-head">
        <div class="eyebrow reveal"><span>02</span><span class="eyebrow-rule"></span><span>The Menu</span></div>
        <h1 class="reveal">Order, pickup, <em>dine in.</em></h1>
        <p class="reveal" data-delay="100">Each dish prepared the moment you ask for it. Browse, add to your cart, and continue to the counter.</p>
    </div>

    <div class="filter-bar reveal" data-delay="150">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search the menu..." />
        </div>
        <div class="filters" id="filters"></div>
    </div>

    <div class="menu-grid" id="menuGrid"></div>

    <div class="overlay" id="overlay"></div>
    <aside class="cart-drawer" id="cartDrawer">
        <div class="cart-head">
            <div>
                <div class="cart-head-title serif">Your <em>cart</em></div>
                <div class="cart-head-sub" id="cartItemLabel">0 items</div>
            </div>
            <button class="cart-close" id="cartClose">&times;</button>
        </div>
        <div class="cart-body" id="cartBody"></div>
        <div class="cart-foot">
            <div class="cart-total-row"><span>Total</span><span class="num" id="cartTotal">€0.00</span></div>
            <div class="cart-tax-note">Tax included</div>
            <button class="btn btn-ink" id="checkoutBtn" style="width:100%; padding:16px;">Continue to checkout</button>
        </div>
    </aside>
</div>

<script src="/assets/ink.js"></script>
<script>
document.getElementById('kc-nav-slot').innerHTML = window.buildKyotoNav('Menu');

const TAX_RATE = 0.10;
let menuItems = [];
let activeCategory = 'All';
let searchText = '';

function formatPrice(v) { return '€' + Number(v).toFixed(2); }

async function loadMenu() {
    try {
        const res = await fetch('/api/menu');
        menuItems = await res.json();
    } catch (e) { menuItems = []; }
    const cats = ['All', ...new Set(menuItems.map(i => i.categoryName))];
    renderFilters(cats);
    renderMenu();
}

function renderFilters(cats) {
    document.getElementById('filters').innerHTML = cats.map(c =>
        `<button class="filter-btn ${c === activeCategory ? 'active' : ''}" data-cat="${c}">${c}</button>`
    ).join('');
    document.querySelectorAll('.filter-btn').forEach(btn => btn.onclick = () => {
        activeCategory = btn.dataset.cat;
        renderFilters(cats); renderMenu();
    });
}

function renderMenu() {
    const filtered = menuItems.filter(i => {
        const catOk = activeCategory === 'All' || i.categoryName === activeCategory;
        const s = searchText.toLowerCase();
        const searchOk = !s || i.itemName.toLowerCase().includes(s) || (i.description || '').toLowerCase().includes(s);
        return catOk && searchOk;
    });
    document.getElementById('menuGrid').innerHTML = filtered.map(i => `
        <div class="dish-card">
            <div class="dish-image">
                <img src="${i.imageUrl}" alt="${i.itemName}" onerror="this.style.display='none'" />
                ${i.bestseller ? '<div class="dish-badge">◇ Bestseller</div>' : ''}
            </div>
            <div class="dish-body">
                <div class="dish-name">${i.itemName}</div>
                <div class="dish-desc">${i.description || ''}</div>
                <div class="dish-footer">
                    <div class="dish-price">${formatPrice(i.price)}</div>
                    <button class="add-btn" data-add="${i.menuItemId}">Add to cart</button>
                </div>
            </div>
        </div>
    `).join('');
    document.querySelectorAll('.add-btn').forEach(btn => btn.onclick = () => addToCart(Number(btn.dataset.add), btn));
}

// Cart.
function getCart() { return window.kcCart.get(); }
function saveCart(c) { window.kcCart.set(c); }

function addToCart(id, btn) {
    const cart = getCart();
    const existing = cart.find(c => c.menuItemId === id);
    if (existing) existing.quantity++;
    else {
        const item = menuItems.find(i => i.menuItemId === id);
        cart.push({ menuItemId: item.menuItemId, itemName: item.itemName, price: Number(item.price), imageUrl: item.imageUrl, quantity: 1 });
    }
    saveCart(cart);
    document.getElementById('kc-nav-slot').innerHTML = window.buildKyotoNav('Menu');
    renderCart();
    openCart();
    if (btn) {
        btn.classList.add('added');
        btn.textContent = 'Added ✓';
        setTimeout(() => { btn.classList.remove('added'); btn.textContent = 'Add to cart'; }, 900);
    }
}

function changeQty(id, delta) {
    let cart = getCart().map(c => c.menuItemId === id ? { ...c, quantity: c.quantity + delta } : c).filter(c => c.quantity > 0);
    saveCart(cart); document.getElementById('kc-nav-slot').innerHTML = window.buildKyotoNav('Menu'); renderCart();
}
function removeItem(id) {
    const cart = getCart().filter(c => c.menuItemId !== id);
    saveCart(cart); document.getElementById('kc-nav-slot').innerHTML = window.buildKyotoNav('Menu'); renderCart();
}

function renderCart() {
    const cart = getCart();
    const totalItems = cart.reduce((s, c) => s + c.quantity, 0);
    const subtotal = cart.reduce((s, c) => s + c.price * c.quantity, 0);
    const total = subtotal * (1 + TAX_RATE);

    document.getElementById('cartItemLabel').textContent = totalItems + (totalItems === 1 ? ' item' : ' items');
    document.getElementById('cartTotal').textContent = formatPrice(total);

    const body = document.getElementById('cartBody');
    if (cart.length === 0) { body.innerHTML = '<div class="cart-empty">Your cart is empty.</div>'; return; }
    body.innerHTML = cart.map(c => `
        <div class="cart-item">
            <img src="${c.imageUrl}" alt="${c.itemName}" onerror="this.style.visibility='hidden'" />
            <div class="cart-item-info">
                <div class="name">${c.itemName}</div>
                <div class="price">${formatPrice(c.price)}</div>
                <div class="qty-row">
                    <button class="qty-btn" data-qty-minus="${c.menuItemId}">−</button>
                    <div class="qty-val">${c.quantity}</div>
                    <button class="qty-btn" data-qty-plus="${c.menuItemId}">+</button>
                </div>
            </div>
            <div class="cart-item-right">
                <button class="cart-remove" data-remove="${c.menuItemId}">Remove</button>
                <div class="cart-item-total">${formatPrice(c.price * c.quantity)}</div>
            </div>
        </div>
    `).join('');
    body.querySelectorAll('[data-qty-minus]').forEach(b => b.onclick = () => changeQty(Number(b.dataset.qtyMinus), -1));
    body.querySelectorAll('[data-qty-plus]').forEach(b => b.onclick = () => changeQty(Number(b.dataset.qtyPlus), 1));
    body.querySelectorAll('[data-remove]').forEach(b => b.onclick = () => removeItem(Number(b.dataset.remove)));
}

function openCart() { document.getElementById('cartDrawer').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
function closeCart() { document.getElementById('cartDrawer').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

document.getElementById('cartClose').onclick = closeCart;
document.getElementById('overlay').onclick = closeCart;
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCart(); });
document.getElementById('searchInput').addEventListener('input', e => { searchText = e.target.value; renderMenu(); });

// Open drawer from nav.
document.querySelector('.kc-cart-btn')?.addEventListener('click', (e) => { e.preventDefault(); openCart(); });

document.getElementById('checkoutBtn').onclick = () => {
    const cart = getCart();
    if (!cart.length) { alert('Your cart is empty.'); return; }
    const sess = window.kcSession.get();
    if (!sess || !sess.token) { location.href = '/login.html?redirect=/payment.html'; return; }
    location.href = '/payment.html';
};

loadMenu();
renderCart();
</script>
</body>
</html>
