<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kyoto Cuisine - Checkout</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, Helvetica, sans-serif; background: #f4f1ee; color: #2f2a28; }
        .serif { font-family: Georgia, "Times New Roman", serif; }
        .topbar { background: #fbfaf8; border-bottom: 1px solid #e4ddd7; padding: 14px 28px; }
        .topbar-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
        .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
        .brand-icon { width: 38px; height: 38px; border-radius: 50%; background: #cf544c; position: relative; flex-shrink: 0; }
        .brand-icon::after { content: ""; position: absolute; inset: 9px; border: 2px solid #fff; border-radius: 50%; }
        .brand-name { font-size: 20px; font-weight: 700; }
        .brand-subtitle { margin-top: 4px; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #8f8882; }
        .back-btn { border: 1px solid #d8d0ca; background: #fff; color: #433d39; border-radius: 12px; padding: 10px 16px; font-size: 14px; cursor: pointer; text-decoration: none; }
        .back-btn:hover { background: #f4f1ee; }
        .checkout-container { max-width: 960px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .section-card { background: #fbfaf8; border: 1px solid #eadfd7; border-radius: 20px; padding: 28px; }
        .section-title { font-size: 24px; color: #332d2a; margin-bottom: 20px; }
        /* Order summary */
        .order-item { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid #ece2db; }
        .order-item:last-child { border-bottom: none; }
        .order-item img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }
        .order-item-info { flex: 1; }
        .order-item-name { font-size: 15px; font-weight: 600; color: #332d2a; }
        .order-item-qty { font-size: 13px; color: #8a847e; margin-top: 2px; }
        .order-item-price { font-size: 15px; font-weight: 700; color: #cf544c; white-space: nowrap; }
        .summary-divider { height: 1px; background: #e7ddd6; margin: 16px 0; }
        .summary-line { display: flex; justify-content: space-between; padding: 6px 0; font-size: 15px; color: #4a4440; }
        .summary-line.total { font-size: 20px; font-weight: 700; color: #332d2a; padding-top: 12px; }
        .summary-line.total span:last-child { color: #cf544c; }
        .tax-note { font-size: 12px; color: #9a938d; text-align: right; margin-top: 4px; }
        /* Payment form */
        .field-group { margin-bottom: 18px; }
        .field-label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 700; color: #3f3835; }
        #card-element { background: #f2eeea; border: 1px solid transparent; border-radius: 14px; padding: 16px; transition: 0.2s; }
        #card-element.StripeElement--focus { border-color: #d9b4af; background: #fff; }
        #card-errors { color: #b91c1c; font-size: 13px; margin-top: 8px; min-height: 20px; }
        .pay-btn { width: 100%; border: none; border-radius: 16px; background: #cf544c; color: #fff; padding: 16px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 20px; box-shadow: 0 10px 22px rgba(207,84,76,0.18); transition: 0.2s; }
        .pay-btn:hover { opacity: 0.92; }
        .pay-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        /* Success overlay */
        .success-overlay { display: none; position: fixed; inset: 0; background: rgba(37,29,25,0.5); z-index: 100; align-items: center; justify-content: center; }
        .success-overlay.show { display: flex; }
        .success-card { background: #fbfaf8; border-radius: 24px; padding: 48px 36px; text-align: center; max-width: 420px; width: 90%; }
        .success-icon { width: 64px; height: 64px; border-radius: 50%; background: #dcfce7; color: #16a34a; font-size: 32px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .success-title { font-size: 28px; color: #332d2a; margin-bottom: 10px; }
        .success-text { color: #8a847e; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
        .success-btn { border: none; border-radius: 14px; background: #cf544c; color: #fff; padding: 14px 28px; font-size: 16px; font-weight: 700; cursor: pointer; }
        .order-type-wrap { display: flex; gap: 10px; margin-bottom: 20px; }
        .order-type-btn { flex: 1; border: 1px solid #e4ddd7; background: #fff; color: #433d39; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; transition: 0.2s; }
        .order-type-btn.active { background: #cf544c; color: #fff; border-color: #cf544c; }
        .notes-input { width: 100%; border: 1px solid transparent; background: #f2eeea; border-radius: 14px; padding: 14px; font-size: 14px; color: #3d3734; outline: none; resize: vertical; min-height: 60px; font-family: inherit; }
        .notes-input:focus { border-color: #d9b4af; background: #fff; }
        @media (max-width: 768px) { .checkout-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a class="brand" href="/menuView.html"><div class="brand-icon"></div><div><div class="brand-name">Kyoto Cuisine</div><div class="brand-subtitle">Japanese Restaurant</div></div></a>
            <a class="back-btn" href="/menuView.html">&larr; Back to Menu</a>
        </div>
    </header>

    <div class="checkout-container">
        <div class="section-card">
            <h2 class="section-title serif">Order Summary</h2>
            <div id="orderItems"></div>
            <div class="summary-divider"></div>
            <div class="summary-line total"><span>Total (tax included)</span><span id="totalAmount">$0.00</span></div>
            <div class="tax-note">All prices include applicable taxes</div>
        </div>

        <div class="section-card">
            <h2 class="section-title serif">Payment Details</h2>
            <div class="order-type-wrap">
                <button class="order-type-btn active" onclick="setOrderType('TAKEAWAY', this)">Takeaway</button>
                <button class="order-type-btn" onclick="setOrderType('DINE_IN', this)">Dine In</button>
            </div>
            <div class="field-group">
                <label class="field-label">Order Notes (optional)</label>
                <textarea class="notes-input" id="orderNotes" placeholder="Special instructions..."></textarea>
            </div>
            <div class="field-group">
                <label class="field-label">Card Information</label>
                <div id="card-element"></div>
                <div id="card-errors"></div>
            </div>
            <button class="pay-btn" id="payBtn" disabled>Pay Now</button>
        </div>
    </div>

    <div class="success-overlay" id="successOverlay">
        <div class="success-card">
            <div class="success-icon">&#10003;</div>
            <h2 class="success-title serif">Order Confirmed!</h2>
            <p class="success-text">Your order <strong id="successOrderId"></strong> has been placed successfully. You'll receive a confirmation email shortly.</p>
            <button class="success-btn" onclick="window.location.href='/menuView.html'">Back to Menu</button>
        </div>
    </div>

    <script>
        const TAX_RATE = 0.10;
        let orderType = 'TAKEAWAY';
        let stripe, cardElement;

        function getSession() { return JSON.parse(localStorage.getItem('kyoto_session') || 'null'); }
        function getCart() { return JSON.parse(localStorage.getItem('kyoto_cart') || '[]'); }
        function formatPrice(v) { return '$' + v.toFixed(2); }

        function setOrderType(type, btn) {
            orderType = type;
            document.querySelectorAll('.order-type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // Check auth
        const session = getSession();
        if (!session || !session.token) { window.location.href = '/login.html'; }

        // Render order summary
        const cart = getCart();
        if (cart.length === 0) { window.location.href = '/menuView.html'; }

        const subtotal = cart.reduce((s, c) => s + c.price * c.quantity, 0);
        const total = subtotal * (1 + TAX_RATE);

        document.getElementById('orderItems').innerHTML = cart.map(c => `
            <div class="order-item">
                <img src="${c.imageUrl}" alt="${c.itemName}" />
                <div class="order-item-info">
                    <div class="order-item-name">${c.itemName}</div>
                    <div class="order-item-qty">Qty: ${c.quantity}</div>
                </div>
                <div class="order-item-price">${formatPrice(c.price * c.quantity)}</div>
            </div>
        `).join('');
        document.getElementById('totalAmount').textContent = formatPrice(total);

        // Initialize Stripe
        async function initStripe() {
            try {
                const res = await fetch('/api/menu/config');
                const config = await res.json();
                stripe = Stripe(config.stripePublishableKey);
                const elements = stripe.elements();
                cardElement = elements.create('card', {
                    style: { base: { fontSize: '16px', color: '#3d3734', '::placeholder': { color: '#a59d97' } } }
                });
                cardElement.mount('#card-element');
                cardElement.on('change', (e) => {
                    document.getElementById('card-errors').textContent = e.error ? e.error.message : '';
                    document.getElementById('payBtn').disabled = !e.complete;
                });
            } catch (e) { console.error('Stripe init failed', e); }
        }

        // Pay
        document.getElementById('payBtn').addEventListener('click', async () => {
            const btn = document.getElementById('payBtn');
            btn.disabled = true;
            btn.textContent = 'Processing...';

            try {
                // 1. Create order
                const orderRes = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': session.token },
                    body: JSON.stringify({
                        orderType: orderType,
                        totalAmount: total.toFixed(2),
                        notes: document.getElementById('orderNotes').value || null,
                        items: cart.map(c => ({
                            menuItemId: c.menuItemId,
                            quantity: c.quantity,
                            unitPrice: c.price.toFixed(2),
                            lineTotal: (c.price * c.quantity).toFixed(2)
                        }))
                    })
                });
                const orderData = await orderRes.json();
                if (!orderRes.ok) throw new Error(orderData.error);

                // 2. Create payment intent
                const piRes = await fetch('/api/payments/create-intent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': session.token },
                    body: JSON.stringify({ orderId: orderData.orderId, amount: total.toFixed(2) })
                });
                const piData = await piRes.json();
                if (!piRes.ok) throw new Error(piData.error);

                // 3. Confirm with Stripe
                const { error, paymentIntent } = await stripe.confirmCardPayment(piData.clientSecret, {
                    payment_method: { card: cardElement }
                });
                if (error) throw new Error(error.message);

                // 4. Record payment in backend
                await fetch('/api/payments/confirm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': session.token },
                    body: JSON.stringify({ orderId: orderData.orderId, transactionReference: paymentIntent.id, amount: total.toFixed(2) })
                });

                // 5. Success - clear cart and show confirmation
                localStorage.removeItem('kyoto_cart');
                document.getElementById('successOrderId').textContent = '#' + orderData.orderId;
                document.getElementById('successOverlay').classList.add('show');

            } catch (err) {
                document.getElementById('card-errors').textContent = err.message;
                btn.disabled = false;
                btn.textContent = 'Pay Now';
            }
        });

        initStripe();
    </script>
</body>
</html>
